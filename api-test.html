<script>
// ══════════════════════════════════════════
// Signing
// ══════════════════════════════════════════
const BASE_URL = 'https://solar.siseli.com/apis'

function getCredentials() {
  return {
    appId: document.getElementById('cfg-appid').value.trim(),
    appSecret: document.getElementById('cfg-secret').value.trim(),
  }
}

function generateNonce() {
  const arr = new Uint8Array(16)
  crypto.getRandomValues(arr)
  return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('')
}

function parseUrlParams(path) {
  const idx = path.indexOf('?')
  if (idx === -1) return {}
  const result = {}
  for (const part of path.slice(idx+1).split('&')) {
    const eqIdx = part.indexOf('=')
    if (eqIdx === -1) continue
    result[part.slice(0, eqIdx)] = decodeURIComponent(part.slice(eqIdx+1))
  }
  return result
}

function calcSign({ method, urlParams = {}, body = '' }) {
  const { appId, appSecret } = getCredentials()
  const nonce = generateNonce()
  const isGet = method.toUpperCase() === 'GET'
  const bodyHash = isGet ? '' : CryptoJS.SHA256(CryptoJS.enc.Utf8.parse(body)).toString(CryptoJS.enc.Hex).toLowerCase()

  const allParams = {
    ...urlParams,
    'IOT-Open-AppID': appId,
    'IOT-Open-Nonce': nonce,
    'IOT-Open-Body-Hash': bodyHash,
  }
  const sorted = Object.entries(allParams).sort(([a],[b]) => a < b ? -1 : a > b ? 1 : 0)
  const plainText = sorted.map(([k,v]) => `${k}=${v}`).join('&')
  const base64Text = CryptoJS.enc.Base64.stringify(CryptoJS.enc.Utf8.parse(plainText))
  const hmac = CryptoJS.HmacSHA256(base64Text, appSecret)
  const sign = CryptoJS.MD5(hmac).toString(CryptoJS.enc.Hex).toLowerCase()

  return {
    'IOT-Open-AppID': appId,
    'IOT-Open-Nonce': nonce,
    'IOT-Open-Body-Hash': bodyHash,
    'IOT-Open-Sign': sign,
  }
}

function md5Password(plain) {
  return CryptoJS.MD5(plain).toString(CryptoJS.enc.Hex).toLowerCase()
}

// ══════════════════════════════════════════
// State
// ══════════════════════════════════════════
let accessToken = null
let deviceId = null
let stationId = null

// ══════════════════════════════════════════
// HTTP
// ══════════════════════════════════════════
async function apiFetch(path, { method = 'GET', data, skipAuth = false } = {}) {
  const bodyStr = data !== undefined ? JSON.stringify(data) : ''
  const signHeaders = calcSign({ method, urlParams: parseUrlParams(path), body: method !== 'GET' ? bodyStr : undefined })
  const headers = {
    'Accept': 'application/json',
    'Content-Type': 'application/json; charset=utf-8',
    ...signHeaders,
  }
  if (accessToken && !skipAuth) headers['IOT-Token'] = accessToken

  const opts = { method, headers }
  if (method !== 'GET' && bodyStr) opts.body = bodyStr

  const resp = await fetch(BASE_URL + path, opts)
  const json = await resp.json()
  return { status: resp.status, json }
}

// ══════════════════════════════════════════
// Test definitions
// ══════════════════════════════════════════
const TESTS = [
  // AUTH GROUP

    id: 'login',
    group: 'auth',
    name: 'Login by Account',
    method: 'POST',
    badge: 'tag-auth',
    run: async () => {

      const password = document.getElementById('cfg-password').value

        data: { account, password: md5Password(password) },
        skipAuth: true,

        accessToken = json.data.accessToken
        document.getElementById('token-display').textContent = accessToken

      return json
    },
    pass: r => r.code === 0 || r.code === '0',

    },
    pass: r => r !== null, // just check it responds

  // DEVICE GROUP

    run: async () => {

      const { json } = await apiFetch(`/station/details?stationId=${id}`)

  },
  {
    id: 'alarm-list',

    method: 'POST',

      const from = new Date(now.getTime() - 24 * 3600 * 1000)

  },

// ══════════════════════════════════════════
// UI
// ══════════════════════════════════════════
let resultItems = {}

function clearResults() {
  document.getElementById('results').innerHTML = ''
  document.getElementById('summary-bar').style.display = 'none'
  resultItems = {}
  accessToken = null
  deviceId = null
  stationId = null
  document.getElementById('token-display').textContent = '—'
}

function createResultItem(test) {
  const div = document.createElement('div')
  div.className = 'result-item'
  div.id = `ri-${test.id}`
  div.innerHTML = `
    <div class="result-header" onclick="toggleBody('${test.id}')">
      <span class="status-dot dot-pending" id="dot-${test.id}"></span>
      <span class="result-name">${test.name}</span>
      <span class="result-method ${test.badge}">${test.method}</span>
      <span class="result-code" id="code-${test.id}"></span>
      <span class="result-time" id="time-${test.id}"></span>
    </div>
    <div class="result-body" id="body-${test.id}">
      <pre id="pre-${test.id}">Waiting...</pre>
    </div>
  `
  document.getElementById('results').appendChild(div)
  resultItems[test.id] = div
}

function toggleBody(id) {
  const body = document.getElementById(`body-${id}`)
  body.classList.toggle('open')
}

function setStatus(id, status, response, ms) {
  const dot = document.getElementById(`dot-${id}`)
  dot.className = `status-dot dot-${status}`
  if (response !== undefined) {
    document.getElementById(`pre-${id}`).textContent = JSON.stringify(response, null, 2)
    document.getElementById(`code-${id}`).textContent = `code: ${response?.code ?? '—'}`
  }
  if (ms !== undefined) {
    document.getElementById(`time-${id}`).textContent = `${ms}ms`
  }
  if (status === 'fail') {
    document.getElementById(`body-${id}`).classList.add('open')
  }
}

async function runTest(test) {
  setStatus(test.id, 'running', undefined, undefined)
  const start = Date.now()
  try {
    const result = await test.run()
    const ms = Date.now() - start
    const passed = test.pass(result)
    setStatus(test.id, passed ? 'pass' : 'fail', result, ms)
    return passed ? 'pass' : 'fail'
  } catch (err) {
    const ms = Date.now() - start
    setStatus(test.id, 'fail', { error: err.message || String(err) }, ms)
    return 'fail'
  }
}

async function runGroup(group) {
  clearResults()
  document.getElementById('summary-bar').style.display = 'flex'
  const tests = TESTS.filter(t => t.group === group)
  for (const t of tests) createResultItem(t)
  let pass = 0, fail = 0
  for (const t of tests) {
    const r = await runTest(t)
    if (r === 'pass') pass++; else fail++
    updateSummary(tests.length, pass, fail)
  }
}

async function runAll() {
  clearResults()
  document.getElementById('summary-bar').style.display = 'flex'
  for (const t of TESTS) createResultItem(t)
  let pass = 0, fail = 0
  for (const t of TESTS) {
    const r = await runTest(t)
    if (r === 'pass') pass++; else fail++
    updateSummary(TESTS.length, pass, fail)
  }
}

function updateSummary(total, pass, fail) {
  document.getElementById('s-total').textContent = total
  document.getElementById('s-pass').textContent = pass
  document.getElementById('s-fail').textContent = fail
  document.getElementById('s-skip').textContent = total - pass - fail
}
</script>
</body>
